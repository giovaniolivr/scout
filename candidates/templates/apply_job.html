{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/candidate.css' %}?v=6">
<link rel="stylesheet" href="{% static 'css/job_detail.css' %}?v=2">
{% endblock %}

{% block content %}
<div class="job-detail-container">

    <a href="{% url 'job_detail' job.id %}" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Voltar para a vaga
    </a>

    <div class="job-detail-card">

        <h2 class="job-detail-title">Candidatar-se</h2>
        <p class="job-detail-company">{{ job.title }} — {{ job.company.company_name }}</p>

        <hr class="detail-divider">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="apply-field-group">
                <label class="apply-label">Nome completo</label>
                <input type="text" class="email-input" value="{{ request.user.get_full_name }}" disabled>
            </div>

            <div class="apply-field-group">
                <label class="apply-label">E-mail</label>
                <input type="text" class="email-input" value="{{ request.user.email }}" disabled>
            </div>

            <div class="apply-field-group">
                <label class="apply-label">Currículo *</label>
                <label class="cv-upload-label {% if cv_error %}cv-upload-label--error{% endif %}" id="cv-label">
                    <input
                        type="file"
                        name="cv"
                        id="cv-input"
                        accept=".pdf,.doc,.docx"
                        class="cv-file-input"
                    >
                    <span class="cv-upload-icon"><i class="fa-solid fa-file-arrow-up"></i></span>
                    <span class="cv-upload-text" id="cv-upload-text">Clique para selecionar o arquivo</span>
                    <span class="cv-upload-hint">PDF, DOC ou DOCX — máximo 5 MB</span>
                </label>
                {% if cv_error %}
                    <p class="input-error">{{ cv_error }}</p>
                {% endif %}
            </div>

            <div class="apply-field-group">
                <label class="apply-label" for="message">Mensagem para a empresa <span style="font-weight:400; color:#777;">(opcional)</span></label>
                <textarea
                    id="message"
                    name="message"
                    class="email-input apply-textarea"
                    rows="4"
                    placeholder="Conte um pouco sobre você ou por que tem interesse nesta vaga..."
                >{{ message|default:'' }}</textarea>
            </div>

            <button type="submit" class="btn btn-black w-100 mt-2">Enviar candidatura</button>
        </form>

    </div>

</div>

<script>
document.getElementById('cv-input').addEventListener('change', function() {
    var label = document.getElementById('cv-upload-text');
    var uploadLabel = document.getElementById('cv-label');
    if (this.files && this.files[0]) {
        label.textContent = this.files[0].name;
        uploadLabel.classList.add('cv-upload-label--selected');
        uploadLabel.classList.remove('cv-upload-label--error');
    } else {
        label.textContent = 'Clique para selecionar o arquivo';
        uploadLabel.classList.remove('cv-upload-label--selected');
    }
});
</script>
{% endblock %}
