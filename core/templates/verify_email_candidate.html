{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="verify-container text-center">
    <h4>
        Digite o código de 4 dígitos enviado para <br>
        <span class="email-text">{{ email }}</span>
    </h4>

    <form method="post" action="{% url 'verify_email_candidate' %}" class="code-form mt-4">
        {% csrf_token %}

        <div class="code-inputs">
            <input type="text" name="code_1" maxlength="1" class="code-box" required autofocus>
            <input type="text" name="code_2" maxlength="1" class="code-box" required>
            <input type="text" name="code_3" maxlength="1" class="code-box" required>
            <input type="text" name="code_4" maxlength="1" class="code-box" required>
        </div>

        <a href="{% url 'resend_candidate_code' %}" class="btn btn-gray mt-4 w-100">
            Reenviar e-mail
        </a>

        <div class="d-flex justify-content-between mt-4 w-100" style="max-width: 320px;">
            <a href="{% url 'register_candidate' %}" class="btn btn-gray nav-btn">← Voltar</a>
            <button type="submit" class="btn btn-gray nav-btn">Avançar →</button>
        </div>
    </form>
</div>
{% endblock %}

{% block footer %}{% endblock %}
